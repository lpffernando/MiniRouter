# MiniRouter — Docker Compose production deployment
#
# This file is the single source of truth for NON-SECRET configuration
# (routing policy, ports). Change a value here and run
# `docker compose up -d` — no image rebuild needed.
#
# Secrets (provider API keys) live ONLY in the server-side `.env`
# (gitignored) and are passed via `env_file:` below.
# Provider endpoints/models also stay in that gitignored `.env` so the
# deployment topology is never committed.
#
# Usage on the server (/opt/minirouter-src):
#   docker compose up -d --build --force-recreate
#
# Ports:
#   8402 -> container API (internal)
#   8082 -> public API, clients use http://<host>:8082/v1

services:
  minirouter:
    image: minirouter:latest
    build:
      context: .
      args:
        # Set to "true" for mainland China (apt mirrors + npmmirror)
        USE_CHINA_MIRROR: "true"
        NPM_REGISTRY: "https://registry.npmmirror.com"
    container_name: minirouter
    restart: unless-stopped
    # Cap memory so a runaway container cannot OOM-kill the host (lightweight
    # cloud has little RAM). Tune to your host: leave headroom for the OS.
    mem_limit: 1g
    memswap_limit: 1g
    ports:
      - "8402:8402"
      - "8082:8402"
    env_file:
      - .env
    environment:
      # ── runtime ──
      - HOME=/data
      - NODE_ENV=production
      - MINIROUTER_SOLO=false
      - MINIROUTER_PORT=8402
      - BLOCKRUN_PROXY_PORT=8402
      # ── routing policy (pinned here; edit + `docker compose up -d`) ──
      - MINIROUTER_CONFIDENCE_THRESHOLD=0.55
      - MINIROUTER_CONFIDENCE_STEEPNESS=12
      - MINIROUTER_BOUNDARY_SIMPLE_MEDIUM=0.10
      - MINIROUTER_BOUNDARY_MEDIUM_COMPLEX=0.3
      - MINIROUTER_BOUNDARY_COMPLEX_REASONING=0.5
      - MINIROUTER_TOKEN_COUNT_SIMPLE=50
      - MINIROUTER_TOKEN_COUNT_COMPLEX=500
      - MINIROUTER_AMBIGUOUS_DEFAULT_TIER=SIMPLE
      - MINIROUTER_STRUCTURED_OUTPUT_MIN_TIER=SIMPLE
      - MINIROUTER_AGENTIC_SCORE_THRESHOLD=0.5
    volumes:
      # Persist SQLite + data outside the container
      - /opt/minirouter-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8402/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
