# MiniRouter Nginx 反代配置
# 适用: Tencent Cloud + 已备案域名
# 用法:
#   1. 把此文件放到 /etc/nginx/sites-available/minirouter
#   2. 修改 server_name 为你的域名
#   3. sudo ln -s /etc/nginx/sites-available/minirouter /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d your-domain.com   # 申请免费 SSL
#   5. sudo nginx -t && sudo systemctl reload nginx

upstream minirouter_backend {
    server 127.0.0.1:8402;
    keepalive 64;
}

server {
    listen 80;
    server_name YOUR_DOMAIN.COM;   # ← 改这里
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.COM;   # ← 改这里

    # SSL — certbot 会自动填写
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # 日志
    access_log /var/log/nginx/minirouter-access.log;
    error_log  /var/log/nginx/minirouter-error.log;

    location / {
        proxy_pass http://minirouter_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
